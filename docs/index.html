<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>It's Just a Game</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0d17;
    color: #fff;
    font-family: ui-rounded, -apple-system, "SF Pro Rounded", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .wrap { max-width: 420px; }
  h1 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; }
  .accent { color: #33d9ff; }
  .pop { color: #ff4dcc; }
  p { color: rgba(255,255,255,0.65); line-height: 1.5; margin-bottom: 12px; }
  .logo { width: 160px; height: 160px; margin-bottom: 16px; filter: drop-shadow(0 0 24px rgba(51,217,255,0.25)); }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="/logo.png" alt="It's Just a Game logo">
    <h1>It's <span class="accent">Just</span> a <span class="pop">Game</span></h1>
    <p>A private, end-to-end encrypted party game for friends and family.
       Mini games, one wheel, no servers that can read anything.</p>
    <p>Got an invite? Open your link on your iPhone with the app installed
       and you'll jump straight into the lobby.</p>
  </div>
</body>
</html>
